name: Auto merge
on:
  pull_request:
    branches:
      - main

jobs:
  merge:
    if: ${{ github.actor == 'dependabot[bot]' }} # only for PRs created by dependabot
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Fetch metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
      # Need following settings in repo:
      #     - `Allow GitHub Actions to create and approve pull requests` enabled
      #     - `Allow auto-merge` enabled
      - if: ${{ steps.dependabot-metadata.outputs.update-type == 'version-update:semver-patch' }}
        name: Approve and merge after workflows passed
        run: |
          gh pr review "${GITHUB_HEAD_REF}" --approve
          gh pr merge "${GITHUB_HEAD_REF}" --squash --auto
